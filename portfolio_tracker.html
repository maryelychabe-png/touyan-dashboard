<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彤心AI组合·持仓分析</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Hero */
.hero { background: linear-gradient(135deg, #111827 0%, #1a1f2e 100%); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px 32px; margin-bottom: 20px; }
.hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.hero .date { color: #9ca3af; font-size: 13px; }
.hero-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
.stat-box { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 18px; min-width: 85px; text-align: center; }
.stat-box .num { font-size: 22px; font-weight: 700; }
.stat-box .label { font-size: 11px; color: #9ca3af; margin-top: 3px; }
.stat-box.up .num { color: #ff4d4d; }
.stat-box.down .num { color: #00ff88; }
.stat-box.neutral .num { color: #fbbf24; }

/* Data source banner */
.data-banner { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.data-tag { background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.15); border-radius: 8px; padding: 6px 14px; font-size: 11.5px; color: #22d3ee; }
.data-tag .dt-time { color: #9ca3af; margin-left: 6px; }

/* Sector bar */
.sector-bar { display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
.sector-seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; padding: 0 8px; }

/* Tabs */
.tab-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 12px; }
.tab-btn { padding: 7px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #9ca3af; transition: all 0.2s; }
.tab-btn:hover { border-color: #22d3ee; color: #22d3ee; }
.tab-btn.active { background: #22d3ee; color: #0a0e1a; border-color: #22d3ee; font-weight: 600; }

/* Stock card */
.stock-card { background: #111827; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: all 0.2s; }
.stock-card:hover { border-color: rgba(34,211,238,0.25); }
.card-hd { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; user-select: none; }
.card-hd .rank { font-size: 13px; font-weight: 700; color: #fbbf24; margin-right: 10px; min-width: 22px; }
.card-hd .name { font-size: 15px; font-weight: 600; margin-right: 8px; }
.card-hd .code { font-size: 11px; color: #6b7280; margin-right: 10px; }
.sector-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; margin-right: 8px; }
.st-electronic { background: rgba(59,130,246,0.2); color: #3b82f6; }
.st-comm { background: rgba(139,92,246,0.2); color: #8b5cf6; }
.st-power { background: rgba(16,185,129,0.2); color: #10b981; }
.st-auto { background: rgba(245,158,11,0.2); color: #f59e0b; }
.st-chem { background: rgba(236,72,153,0.2); color: #ec4899; }
.st-mach { background: rgba(99,102,241,0.2); color: #6366f1; }
.st-textile { background: rgba(156,163,175,0.2); color: #9ca3af; }
.wtag { font-size: 11px; color: #9ca3af; margin-right: 14px; }
.price-area { margin-left: auto; text-align: right; }
.price-area .price { font-size: 17px; font-weight: 700; }
.price-area .chg { font-size: 12px; margin-left: 6px; }
.pu { color: #ff4d4d; } .pd { color: #00ff88; } .pf { color: #fbbf24; }
.badge { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-left: 6px; }
.bg-red { background: rgba(255,77,77,0.15); color: #ff4d4d; }
.bg-cyan { background: rgba(34,211,238,0.15); color: #22d3ee; }
.bg-green { background: rgba(0,255,136,0.15); color: #00ff88; }
.arrow { margin-left: 10px; font-size: 12px; color: #6b7280; transition: transform 0.3s; }
.arrow.open { transform: rotate(180deg); }

/* Card body */
.card-bd { display: none; padding: 0 20px 18px; border-top: 1px solid rgba(255,255,255,0.04); }
.card-bd.open { display: block; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
@media(max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} }
@media(max-width:600px){ .grid{grid-template-columns:1fr} }
.cell { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; }
.cell h4 { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #22d3ee; }
.cell p, .cell table { font-size: 11.5px; color: #d1d5db; line-height: 1.65; }

.tech-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px 10px; margin-top: 6px; font-size: 11px; }
.ti { color: #9ca3af; } .ti span { color: #b0b7c4; }

/* Score badge */
.score-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.sb-high { background: rgba(255,77,77,0.15); color: #ff4d4d; }
.sb-mid { background: rgba(251,191,36,0.15); color: #fbbf24; }
.sb-low { background: rgba(0,255,136,0.15); color: #00ff88; }
.sb-zero { background: rgba(107,114,128,0.15); color: #6b7280; }

.pos-tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.pt-long { background: rgba(255,77,77,0.12); color: #ff4d4d; }
.pt-short { background: rgba(0,255,136,0.12); color: #00ff88; }
.pt-flat { background: rgba(107,114,128,0.12); color: #9ca3af; }

/* Summary table */
.summary-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 11.5px; }
.summary-table th { background: #1a1f2e; color: #22d3ee; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid rgba(34,211,238,0.15); }
.summary-table td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }

/* Loading */
.loading { text-align: center; padding: 80px 20px; color: #6b7280; font-size: 15px; }
.spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(34,211,238,0.2); border-top-color: #22d3ee; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer-note { text-align: center; color: #6b7280; font-size: 11px; margin-top: 24px; padding: 14px; border-top: 1px solid rgba(255,255,255,0.04); }
</style>
</head>
<body>
<div class="container">

<div class="hero">
  <h1>⚡ 彤心AI组合 · 实时持仓分析</h1>
  <div class="date" id="heroDate">加载中...</div>
  <div class="hero-stats" id="heroStats"></div>
</div>

<div class="data-banner" id="dataBanner"></div>

<div class="sector-bar" id="sectorBar"></div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview',this)">📊 概览</button>
  <button class="tab-btn" data-tab="price" onclick="switchTab('price',this)">💰 行情</button>
  <button class="tab-btn" data-tab="score" onclick="switchTab('score',this)">🎯 技术打分</button>
  <button class="tab-btn" data-tab="backtest" onclick="switchTab('backtest',this)">📈 回测数据</button>
  <button class="tab-btn" data-tab="valuation" onclick="switchTab('valuation',this)">💎 估值偏离</button>
</div>

<div id="stockCards"><div class="loading"><div class="spinner"></div><br>正在加载实时行情与打分数据...</div></div>

<div class="footer-note" id="footerNote"></div>

</div>

<script>
// ===== 静态配置（很少变化） =====
const STOCK_CONFIG = [
  { rank: 1,  name: "东山精密", code: "002384", sector: "电子",   weight: 7.69, cost: 22.50 },
  { rank: 2,  name: "深南电路", code: "002916", sector: "电子",   weight: 7.69, cost: 95.00 },
  { rank: 3,  name: "新易盛",   code: "300502", sector: "通信",   weight: 15.38, cost: 380.0 },
  { rank: 4,  name: "中际旭创", code: "300308", sector: "通信",   weight: 15.38, cost: 650.0 },
  { rank: 5,  name: "阳光电源", code: "300274", sector: "电力设备",weight: 7.69, cost: 82.00 },
  { rank: 6,  name: "胜宏科技", code: "300476", sector: "电子",   weight: 7.69, cost: 180.0 },
  { rank: 7,  name: "潍柴动力", code: "000338", sector: "汽车",   weight: 7.69, cost: 26.00 },
  { rank: 8,  name: "天孚通信", code: "300394", sector: "通信",   weight: 7.69, cost: 175.0 },
  { rank: 9,  name: "工业富联", code: "601138", sector: "电子",   weight: 7.69, cost: 45.00 },
  { rank: 10, name: "鹏鼎控股", code: "002938", sector: "电子",   weight: 7.69, cost: 42.00 },
  { rank: 11, name: "巨化股份", code: "600160", sector: "化工",   weight: 7.69, cost: 18.00 },
  { rank: 12, name: "大族激光", code: "002008", sector: "机械设备",weight: 7.69, cost: 55.00 },
  { rank: 13, name: "宏和科技", code: "603256", sector: "纺织服饰",weight: 7.69, cost: 75.00 }
];

const SECTOR_COLORS = {
  "电子": "#3b82f6", "通信": "#8b5cf6", "电力设备": "#10b981",
  "汽车": "#f59e0b", "化工": "#ec4899", "机械设备": "#6366f1",
  "纺织服饰": "#9ca3af"
};
const SECTOR_CSS = {
  "电子": "st-electronic", "通信": "st-comm", "电力设备": "st-power",
  "汽车": "st-auto", "化工": "st-chem", "机械设备": "st-mach", "纺织服饰": "st-textile"
};

let quotesData = null;
let scoresData = null;
let indicesData = null;

// ===== 加载数据 =====
async function loadData() {
  const base = document.location.pathname.replace(/[^/]*$/, '') + 'outputs/';
  try {
    const [q, s, i] = await Promise.all([
      fetch(base + 'portfolio_quotes.json').then(r => r.json()).catch(() => null),
      fetch(base + 'tongxin_ai_scores.json').then(r => r.json()).catch(() => null),
      fetch(base + 'index_scores.json').then(r => r.json()).catch(() => null)
    ]);
    quotesData = q; scoresData = s; indicesData = i;
    render();
  } catch(e) {
    document.getElementById('stockCards').innerHTML =
      '<div style="text-align:center;padding:40px;color:#ff4d4d;">❌ 数据加载失败，请检查outputs目录下的JSON文件是否存在。</div>';
  }
}

// ===== 渲染 =====
function render() {
  if (!quotesData) return;

  const stocks = STOCK_CONFIG.map(cfg => {
    const q = (quotesData.stocks || []).find(s => s.code === cfg.code) || {};
    const sc = scoresData?.latest_scores?.[cfg.name];
    const bt = (scoresData?.backtest_results || []).find(b => b["代码"] === cfg.code);
    return { ...cfg, quote: q, score: sc, backtest: bt };
  });

  // Hero date & stats
  const tradeDate = quotesData.trade_date || quotesData.generated_at?.substring(0,10);
  document.getElementById('heroDate').textContent =
    `交易日: ${tradeDate} | 数据生成: ${quotesData.generated_at || '未知'}`;

  const upCount = stocks.filter(s => (s.quote.changePct||0) > 0).length;
  const dnCount = stocks.filter(s => (s.quote.changePct||0) < 0).length;
  const totalPnl = stocks.reduce((sum,s) => {
    const pnl = s.cost > 0 ? ((s.quote.price - s.cost) / s.cost * 100) : 0;
    return sum + pnl * s.weight / 100;
  }, 0);

  document.getElementById('heroStats').innerHTML = `
    <div class="stat-box neutral"><div class="num">${stocks.length}</div><div class="label">持仓数</div></div>
    <div class="stat-box ${upCount>dnCount?'up':'down'}"><div class="num">${upCount}↑ ${dnCount}↓</div><div class="label">涨跌分布</div></div>
    <div class="stat-box ${totalPnl>=0?'up':'down'}"><div class="num">${totalPnl>=0?'+':''}${totalPnl.toFixed(2)}%</div><div class="label">组合浮盈</div></div>
  `;

  // Data banner
  document.getElementById('dataBanner').innerHTML = `
    <div class="data-tag">📡 TDX实时行情<span class="dt-time">${quotesData.generated_at || '-'}</span></div>
    <div class="data-tag">🎯 华泰技术打分<span class="dt-time">${scoresData?.generated_at?.substring(0,16)||'-'}</span></div>
    <div class="data-tag">📊 回测数据<span class="dt-time">${scoresData?.generated_at?.substring(0,16)||'-'}</span></div>
  `;

  // Sector bar
  const sectorMap = {};
  stocks.forEach(s => { sectorMap[s.sector] = (sectorMap[s.sector]||0) + s.weight; });
  let sbHtml = '';
  Object.entries(sectorMap).sort((a,b)=>b[1]-a[1]).forEach(([sec,w]) => {
    const c = SECTOR_COLORS[sec] || '#6b7280';
    sbHtml += `<div class="sector-seg" style="background:${c};width:${w}%">${sec} ${w}%</div>`;
  });
  document.getElementById('sectorBar').innerHTML = sbHtml;

  // Render cards
  document.getElementById('stockCards').innerHTML = stocks.map((s,i) => cardHtml(s,i)).join('');

  // Footer
  document.getElementById('footerNote').textContent =
    `彤心AI组合持仓分析 | TDX实时行情 + 华泰技术打分 | 数据来源: 通达信/iFinD | 仅供研究参考，不构成投资建议`;
}

function cardHtml(s, idx) {
  const q = s.quote;
  const price = q.price || 0;
  const chgPct = q.changePct || 0;
  const isUp = chgPct > 0, isDn = chgPct < 0;
  const pc = isUp ? 'pu' : (isDn ? 'pd' : 'pf');
  const pnlPct = s.cost > 0 ? ((price - s.cost) / s.cost * 100) : 0;
  const pnlC = pnlPct > 0 ? '#ff4d4d' : (pnlPct < 0 ? '#00ff88' : '#fbbf24');

  // Score display
  let scoreHtml = '<span style="color:#6b7280;font-size:11px;">无打分</span>';
  if (s.score) {
    const sc = s.score.score;
    let cls = 'sb-zero';
    if (sc >= 0.8) cls = 'sb-high'; else if (sc >= 0.2) cls = 'sb-mid'; else if (sc > 0) cls = 'sb-low';
    scoreHtml = `<span class="score-badge ${cls}">${sc.toFixed(1)}</span>`;
  }

  // Position tags
  let posV1 = '', posV2 = '';
  if (s.score) {
    const v1 = s.score.position_v1, v2 = s.score.position_v2;
    if (v1 === 1) posV1 = '<span class="pos-tag pt-long">V1多</span>'; else if (v1 === -1) posV1 = '<span class="pos-tag pt-short">V1空</span>'; else posV1 = '<span class="pos-tag pt-flat">V1平</span>';
    if (v2 === 1) posV2 = '<span class="pos-tag pt-long">V2多</span>'; else if (v2 === -1) posV2 = '<span class="pos-tag pt-short">V2空</span>'; else posV2 = '<span class="pos-tag pt-flat">V2平</span>';
  }

  // Badge
  let badgeHtml = '';
  if (chgPct >= 9.9) badgeHtml = '<span class="badge bg-red">涨停</span>';
  else if (chgPct <= -9.9) badgeHtml = '<span class="badge bg-green">跌停</span>';
  else if (chgPct >= 5) badgeHtml = '<span class="badge bg-red">暴涨</span>';
  else if (chgPct >= 3) badgeHtml = '<span class="badge bg-cyan">强势</span>';

  const secCls = SECTOR_CSS[s.sector] || '';

  // Body content
  const bodyId = `bd_${idx}`;
  const arrowId = `ar_${idx}`;

  // Overview tab
  const overviewTab = overviewBody(s);
  // Price tab
  const priceTab = priceBody(q);
  // Score tab
  const scoreTab = scoreBody(s.score);
  // Backtest tab
  const backtestTab = backtestBody(s.backtest);
  // Valuation tab
  const valuationTab = valuationBody(q, s);

  return `
<div class="stock-card">
  <div class="card-hd" onclick="toggleCard('${bodyId}','${arrowId}')">
    <div class="rank">#${s.rank}</div>
    <div class="name">${s.name}</div>
    <div class="code">${s.code}</div>
    <span class="sector-tag ${secCls}">${s.sector}</span>
    <span class="wtag">仓位${s.weight}%</span>
    ${scoreHtml}
    ${posV1}${posV2}
    ${badgeHtml}
    <div class="price-area">
      <span class="price ${pc}">${price.toFixed(2)}</span>
      <span class="chg ${pc}">${isUp?'+':''}${chgPct.toFixed(2)}%</span>
      <div style="font-size:11px;color:${pnlC}">浮盈${pnlPct>=0?'+':''}${pnlPct.toFixed(1)}%</div>
    </div>
    <span class="arrow" id="${arrowId}">▼</span>
  </div>
  <div class="card-bd open" id="${bodyId}">
    <div class="grid">
      ${overviewTab}
      ${priceTab}
      ${scoreTab}
      ${backtestTab}
      ${valuationTab}
    </div>
  </div>
</div>`;
}

function overviewBody(s) {
  const q = s.quote;
  const yChg = q.yearChange ?? null;
  const z20 = q.zaf20 ?? null;
  return `<div class="cell"><h4>📋 概览</h4><p>
    <strong>${s.name}</strong> (${s.code}) · ${s.sector}<br>
    仓位: <b>${s.weight}%</b> · 成本: ¥${s.cost.toFixed(2)}<br>
    现价: <span style="color:${q.changePct>=0?'#ff4d4d':'#00ff88'}">¥${(q.price||0).toFixed(2)}</span>
    (${q.changePct>=0?'+':''}${(q.changePct||0).toFixed(2)}%)<br>
    年初至今: <span style="color:${(yChg||0)>=0?'#ff4d4d':'#00ff88'}">${yChg!=null?(yChg>=0?'+':'')+yChg.toFixed(1)+'%':'N/A'}</span>
    · 20日: <span style="color:${(z20||0)>=0?'#ff4d4d':'#00ff88'}">${z20!=null?(z20>=0?'+':'')+z20.toFixed(1)+'%':'N/A'}</span><br>
    换手率: ${(q.hsl||0).toFixed(2)}% · 振幅: ${(q.amplitude||0).toFixed(2)}% · 量比: ${(q.lb||0).toFixed(2)}
  </p></div>`;
}

function priceBody(q) {
  return `<div class="cell"><h4>💰 盘面数据</h4>
    <table class="tech-grid" style="display:block;">
      <tr><td class="ti">开盘:</td><td><span>${(q.open||0).toFixed(2)}</span></td><td class="ti">最高:</td><td><span style="color:#ff4d4d;">${(q.high||0).toFixed(2)}</span></td></tr>
      <tr><td class="ti">最低:</td><td><span style="color:#00ff88;">${(q.low||0).toFixed(2)}</span></td><td class="ti">昨收:</td><td><span>${(q.prevClose||0).toFixed(2)}</span></td></tr>
      <tr><td class="ti">均价:</td><td><span>${(q.avgPrice||0).toFixed(2)}</span></td><td class="ti">成交额:</td><td><span>${fmtAmt(q.amount||0)}</span></td></tr>
      <tr><td class="ti">成交量:</td><td><span>${fmtVol(q.volume||0)}</span></td><td class="ti">换手:</td><td><span>${(q.hsl||0).toFixed(2)}%</span></td></tr>
      <tr><td class="ti">PE(TTM):</td><td><span>${(q.pe_ttm||0).toFixed(1)}</span></td><td class="ti">市值:</td><td><span>${fmtCap(q.market_cap||0)}</span></td></tr>
      <tr><td class="ti">年内涨停:</td><td><span style="color:#ff4d4d;">${q.yearZTDay||0}次</span></td><td class="ti">振幅:</td><td><span>${(q.amplitude||0).toFixed(2)}%</span></td></tr>
    </table>
  </div>`;
}

function scoreBody(sc) {
  if (!sc) return `<div class="cell"><h4>🎯 技术打分</h4><p>暂无打分数据</p></div>`;
  const s = sc.score;
  let sl = 'sb-zero', slText = '中性';
  if (s >= 0.8) { sl='sb-high'; slText='强烈看多'; }
  else if (s >= 0.4) { sl='sb-mid'; slText='偏多'; }
  else if (s >= 0.1) { sl='sb-low'; slText='偏弱'; }
  else if (s > 0) { sl='sb-zero'; slText='中性偏弱'; }
  else { sl='sb-zero'; slText='偏空'; }

  const v1 = sc.position_v1, v2 = sc.position_v2;
  const v1T = v1===1?'做多':(v1===-1?'做空':'观望');
  const v2T = v2===1?'做多':(v2===-1?'做空':'观望');

  return `<div class="cell"><h4>🎯 技术打分</h4><p>
    综合评分: <span class="score-badge ${sl}">${s.toFixed(2)}</span> (${slText})<br><br>
    V1策略信号: <b>${v1T}</b> (${v1})<br>
    V2策略信号: <b>${v2T}</b> (${v2})<br><br>
    <span style="color:#6b7280;font-size:10.5px;">基于华泰金工技术指标体系(MA/MACD/RSI/BOLL/Keltner等多因子)</span>
  </p></div>`;
}

function backtestBody(bt) {
  if (!bt) return `<div class="cell"><h4>📈 回测表现</h4><p>暂无回测数据</p></div>`;
  return `<div class="cell"><h4>📈 回测表现</h4>
    <table style="font-size:11px;width:100%;">
      <tr><td style="color:#9ca3af;padding:3px 0;">V1年化</td><td style="color:${bt['V1年化%']>=0?'#ff4d4d':'#00ff88'};text-align:right;font-weight:600;">${bt['V1年化%'].toFixed(1)}%</td>
          <td style="color:#9ca3af;padding:3px 0 0 12px;">V1夏普</td><td style="text-align:right;color:#22d3ee;">${bt['V1夏普'].toFixed(2)}</td></tr>
      <tr><td style="color:#9ca3af;padding:3px 0;">V1胜率</td><td style="text-align:right;">${bt['V1胜率%'].toFixed(1)}%</td>
          <td style="color:#9ca3af;padding:3px 0 0 12px;">V1回撤</td><td style="text-align:right;color:#ff4d4d;">${bt['V1回撤%'].toFixed(1)}%</td></tr>
      <tr><td style="color:#9ca3af;padding:3px 0;border-top:1px solid rgba(255,255,255,0.05);">V2年化</td><td style="border-top:1px solid rgba(255,255,255,0.05);color:${bt['V2年化%']>=0?'#ff4d4d':'#00ff88'};text-align:right;font-weight:600;">${bt['V2年化%'].toFixed(1)}%</td>
          <td style="border-top:1px solid rgba(255,255,255,0.05);color:#9ca3af;padding:3px 0 0 12px;">V2夏普</td><td style="border-top:1px solid rgba(255,255,255,0.05);text-align:right;color:#22d3ee;">${bt['V2夏普'].toFixed(2)}</td></tr>
      <tr><td style="color:#9ca3af;padding:3px 0;">V2胜率</td><td style="text-align:right;">${bt['V2胜率%'].toFixed(1)}%</td>
          <td style="color:#9ca3af;padding:3px 0 0 12px;">V2回撤</td><td style="text-align:right;color:#ff4d4d;">${bt['V2回撤%'].toFixed(1)}%</td></tr>
      <tr><td style="color:#9ca3af;padding:3px 0;border-top:1px solid rgba(34,211,238,0.15);">基准年化</td><td style="border-top:1px solid rgba(34,211,238,0.15);text-align:right;font-weight:600;color:#fbbf24;">${bt['基准年化%'].toFixed(1)}%</td>
          <td style="border-top:1px solid rgba(34,211,238,0.15);color:#9ca3af;padding:3px 0 0 12px;">基准夏普</td><td style="border-top:1px solid rgba(34,211,238,0.15);text-align:right;color:#fbbf24;">${bt['基准夏普'].toFixed(2)}</td></tr>
    </table>
  </div>`;
}

function valuationBody(q, s) {
  const pe = q.pe_ttm || 0;
  const mc = q.market_cap || 0;
  const yChg = q.yearChange || 0;
  const peColor = pe < 30 ? '#00ff88' : (pe < 60 ? '#fbbf24' : '#ff4d4d');
  let peLevel = '偏高';
  if (pe < 20) peLevel = '低估'; else if (pe < 35) peLevel = '合理'; else if (pe < 60) peLevel = '偏高'; else peLevel = '高估';

  return `<div class="cell"><h4>💎 估值与偏离</h4><p>
    PE(TTM): <span style="color:${peColor};font-weight:700;">${pe.toFixed(1)}x</span> (${peLevel})<br>
    总市值: <b>${fmtCap(mc)}</b><br>
    年内涨幅: <span style="color:${yChg>=0?'#ff4d4d':'#00ff88'}">${yChg>=0?'+':''}${yChg.toFixed(1)}%</span><br>
    量比: <span style="color:${(q.lb||0)>1.2?'#ff4d4d':(q.lb||0)<0.8?'#00ff88':'#fbbf24'}">${(q.lb||0).toFixed(2)}</span>
    (<span style="color:#6b7280;font-size:10px;">${(q.lb||0)>1.2?'放量':(q.lb||0)<0.8?'缩量':'正常'}</span>)<br><br>
    <span style="color:#6b7280;font-size:10.5px;">估值参考：PE<20低估 / 20-35合理 / 35-60偏高 / >60高估</span>
  </p></div>`;
}

// Utils
function fmtVol(v) { if (v >= 10000) return (v/10000).toFixed(1) + '万手'; return v + '手'; }
function fmtAmt(a) { if (a >= 1e8) return (a/1e8).toFixed(2) + '亿'; if (a >= 1e4) return (a/1e4).toFixed(0) + '万'; return a.toFixed(0); }
function fmtCap(c) { if (c >= 1e12) return (c/1e12).toFixed(2) + '万亿'; if (c >= 1e8) return (c/1e8).toFixed(1) + '亿'; return c.toFixed(0); }

function toggleCard(bid, aid) {
  const el = document.getElementById(bid), ar = document.getElementById(aid);
  el.classList.toggle('open'); ar.classList.toggle('open');
}

let currentTab = 'overview';
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Tab switching just shows/hides relevant cells - for now all cells visible
}

// Init
loadData();
</script>
</body>
</html>
